<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="extGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">系统技术架构特性</text>

  <!-- Extensionality Section -->
  <g transform="translate(50, 80)">
    <rect width="340" height="380" rx="15" fill="url(#extGradient)" filter="url(#shadow)"/>
    <text x="170" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">扩展性</text>

    <!-- Module 1: Modular Design -->
    <g transform="translate(20, 60)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#2980b9">● 模块化设计</text>
      <text x="15" y="38" font-size="11" fill="#555">各功能模块独立封装，便于扩展维护</text>
    </g>

    <!-- Module 2: Containerization -->
    <g transform="translate(20, 120)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#2980b9">● 容器化部署</text>
      <text x="15" y="38" font-size="11" fill="#555">支持Docker容器化，便于横向扩展</text>
    </g>

    <!-- Module 3: API Design -->
    <g transform="translate(20, 180)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#2980b9">● API设计</text>
      <text x="15" y="38" font-size="11" fill="#555">RESTful API，标准化接口便于集成</text>
    </g>

    <!-- Module 4: Database Migration -->
    <g transform="translate(20, 240)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#2980b9">● 自动数据库迁移</text>
      <text x="15" y="38" font-size="11" fill="#555">应用启动时自动检测并修复表结构</text>
    </g>

    <!-- Icon for Extensionality -->
    <g transform="translate(120, 310)">
      <circle cx="50" cy="50" r="35" fill="#fff" fill-opacity="0.3"/>
      <path d="M35 50 L45 60 L65 40" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Security Section -->
  <g transform="translate(410, 80)">
    <rect width="340" height="380" rx="15" fill="url(#secGradient)" filter="url(#shadow)"/>
    <text x="170" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">安全性</text>

    <!-- Module 1: Identity Authentication -->
    <g transform="translate(20, 60)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#c0392b">● 身份认证</text>
      <text x="15" y="38" font-size="11" fill="#555">基于JWT验证，支持token过期刷新</text>
    </g>

    <!-- Module 2: Password Storage -->
    <g transform="translate(20, 120)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#c0392b">● 密码存储</text>
      <text x="15" y="38" font-size="11" fill="#555">bcrypt哈希存储，防止密码泄露</text>
    </g>

    <!-- Module 3: Permission Control -->
    <g transform="translate(20, 180)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#c0392b">● 权限控制</text>
      <text x="15" y="38" font-size="11" fill="#555">基于角色的权限控制，细粒度管理</text>
    </g>

    <!-- Module 4: Anti-Cheating -->
    <g transform="translate(20, 240)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#c0392b">● 防作弊机制</text>
      <text x="15" y="38" font-size="11" fill="#555">前端限制+后端校验，确保学习真实性</text>
    </g>

    <!-- Module 5: Data Validation -->
    <g transform="translate(20, 300)">
      <rect width="300" height="45" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="14" font-weight="bold" fill="#c0392b">● 数据验证</text>
      <text x="15" y="38" font-size="11" fill="#555">严格数据验证，防止SQL注入攻击</text>
    </g>

    <!-- Module 6: HTTPS Support -->
    <g transform="translate(20, 360)">
      <rect width="300" height="30" rx="8" fill="#fff" fill-opacity="0.9"/>
      <text x="15" y="20" font-size="13" font-weight="bold" fill="#c0392b">● HTTPS支持</text>
      <text x="100" y="20" font-size="11" fill="#555">加密传输，防止数据窃听篡改</text>
    </g>
  </g>

  <!-- Connection Line -->
  <path d="M400 270 L400 270" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,5"/>

</svg>